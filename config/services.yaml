# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
parameters:
    # Default sender if MAIL_FROM is not set in the environment (.env is git-ignored).
    # Resend's sandbox sender only delivers to your own Resend account email.
    env(MAIL_FROM): 'onboarding@resend.dev'

    # Defaults for optional integrations. Because .env is git-ignored, these are
    # absent on the host unless set as platform variables. Without a default,
    # %env(...)% throws "Environment variable not found" and crashes any controller
    # that injects the dependent service (e.g. ReservationController -> Flouci).
    # Empty/sane defaults let the integration degrade gracefully instead.
    env(FLOUCI_APP_PUBLIC): ''
    env(FLOUCI_APP_SECRET): ''
    env(AI_API_URL): 'https://api.groq.com/openai/v1/chat/completions'
    env(AI_API_KEY): ''
    env(AI_MODEL): 'llama-3.3-70b-versatile'
    env(AI_SUGGESTION_ENABLED): '0'
    env(OPENWEATHERMAP_API_KEY): ''
    env(RAPIDAPI_KEY): ''
    env(RAPIDAPI_BOOKING_HOST): 'booking-com15.p.rapidapi.com'
    env(NVIDIA_API_KEY): ''
    env(RESEND_API_KEY): ''
    env(TWILIO_ACCOUNT_SID): ''
    env(TWILIO_AUTH_TOKEN): ''
    env(TWILIO_MESSAGING_SERVICE_SID): ''
    env(CLOUDINARY_CLOUD_NAME): ''
    env(CLOUDINARY_API_KEY): ''
    env(CLOUDINARY_API_SECRET): ''
    # Optional front-end integrations (rendered only when set). Empty = disabled.
    env(TAWK_PROPERTY_ID): ''
    env(TAWK_WIDGET_ID): ''
    env(GA_MEASUREMENT_ID): ''

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\Controller\:
        resource: '../src/Controller/'
        tags: ['controller.service_arguments']

    App\Service\BookingComService:
        arguments:
            $apiKey:  '%env(string:RAPIDAPI_KEY)%'
            $apiHost: '%env(string:RAPIDAPI_BOOKING_HOST)%'
    App\Service\Analytics\NvidiaAIClient:
        arguments:
            $apiKeyNvidia: '%env(NVIDIA_API_KEY)%'
    App\Service\TwilioSmsService:
        arguments:
            $accountSid:          '%env(string:TWILIO_ACCOUNT_SID)%'
            $authToken:           '%env(string:TWILIO_AUTH_TOKEN)%'
            $messagingServiceSid: '%env(string:TWILIO_MESSAGING_SERVICE_SID)%'

    App\Service\AiResponseSuggestionService:
        arguments:
            $apiUrl:  '%env(string:AI_API_URL)%'
            $apiKey:  '%env(string:AI_API_KEY)%'
            $model:   '%env(string:AI_MODEL)%'
            $enabled: '%env(bool:AI_SUGGESTION_ENABLED)%'

    App\Service\FlouciPaymentService:
        arguments:
            $appPublic: '%env(string:FLOUCI_APP_PUBLIC)%'
            $appSecret: '%env(string:FLOUCI_APP_SECRET)%'

    App\Service\CloudinaryService:
        arguments:
        
            $cloudName: '%env(string:CLOUDINARY_CLOUD_NAME)%'
            $apiKey:    '%env(string:CLOUDINARY_API_KEY)%'
            $apiSecret: '%env(string:CLOUDINARY_API_SECRET)%'

    App\Service\AiVoyageService:
        arguments:
            $apiUrl:  '%env(string:AI_API_URL)%'
            $apiKey:  '%env(string:AI_API_KEY)%'
            $model:   '%env(string:AI_MODEL)%'
            $enabled: '%env(bool:AI_SUGGESTION_ENABLED)%'

    App\Service\AiBudgetPlannerService:
        arguments:
            $apiUrl:  '%env(string:AI_API_URL)%'
            $apiKey:  '%env(string:AI_API_KEY)%'
            $model:   '%env(string:AI_MODEL)%'
            $enabled: '%env(bool:AI_SUGGESTION_ENABLED)%'

    App\Service\AiCancellationService:
        arguments:
            $apiUrl:  '%env(string:AI_API_URL)%'
            $apiKey:  '%env(string:AI_API_KEY)%'
            $model:   '%env(string:AI_MODEL)%'
            $enabled: '%env(bool:AI_SUGGESTION_ENABLED)%'

    App\Service\WeatherService:
        arguments:
            $apiKey: '%env(string:OPENWEATHERMAP_API_KEY)%'

    App\Service\MailerService:
        arguments:
            $apiKey: '%env(RESEND_API_KEY)%'
            $fromAddress: '%env(MAIL_FROM)%'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
