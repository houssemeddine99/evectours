<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Offline — Evec Tours</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #060d1e; color: #e5e7eb; font-family: Inter, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 24px; }
  .offline-box { max-width: 420px; }
  .offline-icon { font-size: 5rem; margin-bottom: 20px; }
  h1 { font-size: 1.8rem; font-weight: 900; margin-bottom: 12px; }
  p { color: #8fa3c0; line-height: 1.65; margin-bottom: 28px; }
  a { display: inline-block; background: linear-gradient(135deg, #f5c300, #ffd740); color: #0a0f1c; padding: 13px 28px; border-radius: 10px; font-weight: 800; text-decoration: none; }
</style>
</head>
<body>
  <div class="offline-box">
    <div class="offline-icon">✈️</div>
    <h1>You're offline</h1>
    <p>It looks like you've lost your internet connection. Check your connection and try again — your adventure awaits!</p>
    <a href="/" onclick="window.location.reload()">Try Again</a>
  </div>
</body>
</html>
